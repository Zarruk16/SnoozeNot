<div class="datetime-picker">
  <input type="hidden" name="user_tz" id="user_tz" value="">
  <div class="datetime-picker-part">
    <label class="datetime-picker-label" for="due_date">Date</label>
    <div class="picker-wrap">
      <input type="date" id="due_date" name="due_date" class="form-input"
             {% if value_date %}value="{{ value_date }}"{% endif %}
             {% if required %}required{% endif %}>
      <svg class="picker-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
        <rect x="3" y="4" width="18" height="18" rx="2"/>
        <line x1="16" y1="2" x2="16" y2="6"/>
        <line x1="8" y1="2" x2="8" y2="6"/>
        <line x1="3" y1="10" x2="21" y2="10"/>
      </svg>
    </div>
  </div>

  <div class="datetime-picker-part">
    <label class="datetime-picker-label" for="due_time">Time</label>
    <div class="picker-wrap">
      <input type="time" id="due_time" name="due_time" class="form-input"
             {% if value_time %}value="{{ value_time }}"{% endif %}
             {% if required %}required{% endif %}>
      <svg class="picker-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
        <circle cx="12" cy="12" r="10"/>
        <polyline points="12 6 12 12 16 14"/>
      </svg>
    </div>
  </div>
</div>
<script>
(function () {
  var tz = document.getElementById('user_tz');
  if (tz) {
    tz.value = Intl.DateTimeFormat().resolvedOptions().timeZone || '';
  }
})();
</script>
