{% load static %}
<aside class="sidebar" id="sidebar">
  <a class="sidebar-brand" href="{% url 'UserAuth:Dashboard' %}">
    <div class="brand-logo">SN</div>
    <span>SnoozeNot</span>
  </a>

  <div class="user-card">
    <div class="user-avatar">{{ user.username|slice:":2" }}</div>
    <div>
      <div class="user-name">{{ user.username }}</div>
      <div class="user-role">Focus mode</div>
    </div>
  </div>

  <a class="add-task-btn" href="{% url 'UserAuth:todo_list' %}">
    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M12 5v14M5 12h14"/></svg>
    Add Task
  </a>

  <nav class="sidebar-nav">
    <a class="nav-link {% if request.resolver_match.url_name == 'Dashboard' %}active{% endif %}" href="{% url 'UserAuth:Dashboard' %}">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="7" height="7" rx="1"/><rect x="14" y="3" width="7" height="7" rx="1"/><rect x="3" y="14" width="7" height="7" rx="1"/><rect x="14" y="14" width="7" height="7" rx="1"/></svg>
      Dashboard
    </a>
    <a class="nav-link {% if request.resolver_match.url_name == 'Inbox' %}active{% endif %}" href="{% url 'UserAuth:Inbox' %}">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M22 12h-6l-2 3H10l-2-3H2"/><path d="M5.45 5.11L2 12v6a2 2 0 002 2h16a2 2 0 002-2v-6l-3.45-6.89A2 2 0 0016.76 4H7.24a2 2 0 00-1.79 1.11z"/></svg>
      Inbox
    </a>
    <a class="nav-link {% if request.resolver_match.url_name == 'Today' %}active{% endif %}" href="{% url 'UserAuth:Today' %}">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="4" width="18" height="18" rx="2"/><path d="M16 2v4M8 2v4M3 10h18"/></svg>
      Today
    </a>
    <a class="nav-link {% if request.resolver_match.url_name == 'Upcoming' %}active{% endif %}" href="{% url 'UserAuth:Upcoming' %}">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><path d="M12 6v6l4 2"/></svg>
      Upcoming
    </a>
    <a class="nav-link {% if request.resolver_match.url_name == 'Completed' %}active{% endif %}" href="{% url 'UserAuth:Completed' %}">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M22 11.08V12a10 10 0 11-5.93-9.14"/><path d="M22 4L12 14.01l-3-3"/></svg>
      Completed
    </a>

    <div class="nav-divider"></div>

    <a class="nav-link" href="{% url 'UserAuth:logout' %}">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 21H5a2 2 0 01-2-2V5a2 2 0 012-2h4M16 17l5-5-5-5M21 12H9"/></svg>
      Logout
    </a>
  </nav>
</aside>
<div class="sidebar-overlay" id="sidebar-overlay"></div>
