{% extends "userauth/base.html" %}
{% load static %}

{% block body %}
<div class="public-layout public-layout-minimal">
  <header class="public-header public-header-minimal">
    <a class="brand" href="{% url 'home' %}">
      <div class="brand-logo">SN</div>
      <span class="brand-name">SnoozeNot</span>
    </a>
    {% if request.user.is_authenticated %}
      <a class="btn btn-ghost btn-sm" href="{% url 'UserAuth:logout' %}">Logout</a>
    {% endif %}
  </header>

  {% block content %}{% endblock %}

  <footer class="public-footer public-footer-minimal">
    &copy; {% now "Y" %} SnoozeNot
  </footer>
</div>
{% endblock %}
